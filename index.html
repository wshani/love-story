<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Love Story ❤️</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>


<body>

<div class="scene">
    <div class="heart"></div>
</div>

<h1 id="names">💖 Shani ❤️ Minura 💖</h1>
<p>Engagement Anniversary: <b>17th of April</b></p>

<h2 id="question">Do you love me? ❤️</h2>

<button id="yesBtn" onclick="startStory(true)">Yes 💖</button>
<button id="noBtn" onclick="moveNo()">No</button>

<div id="message"></div>

<button id="shareBtn" onclick="shareWhatsApp()">📲 Share on WhatsApp</button>

<div id="popup">
    <img id="popupImg">
    <p id="popupText"></p>
    <button onclick="closePopup()">Close</button>
</div>

<canvas id="heartCanvas" width="400" height="400"></canvas>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
