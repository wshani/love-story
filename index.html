<meta charset="UTF-8">
<title>Our Love Story ❤️</title>

<body>
    <div class="page-grid">

  <!-- TOP ROW -->
  <div class="slot" id="slot1"><img id="slot1Img" alt="Memory 1"></div>
  <div class="slot" id="slot2"><img id="slot2Img" alt="Memory 2"></div>
  <div class="slot" id="slot3"><img id="slot3Img" alt="Memory 3"></div>

  <!-- LEFT: glowing heart -->
  <div class="scene-area">
    <div class="scene">
      <div class="heart"></div>
    </div>
  </div>

  <!-- MIDDLE: IMAGE 4 background + ALL TEXTS on top -->
  <div class="middle-area">
    <img id="slot4Img" class="middle-bg">

    <div class="middle-overlay">
      <h1>💖 Shani ❤️ Minura 💖</h1>
      <p class="eng-date">Engagement Anniversary: <b>17th of April</b></p>

      <h2 id="question">Do you love me? ❤️</h2>

      <div class="btn-area">
        <button id="yesBtn" onclick="nextStep()">Yes 💖</button>
        <button id="noBtn" onclick="moveNo()">No 😜</button>
      </div>

      <div id="message"></div>

      <div id="finalLove" class="final-love">
        I Love You Forever 💖<br>
        💍 Happy Anniversary 💖
      </div>
    </div>
  </div>

  <!-- RIGHT: IMAGE 5 (old canvas place) + HEART CANVAS overlay at the end -->
  <div class="slot" id="slot5">
    <img id="slot5Img">

    <!-- Canvas sits ON TOP of image 5 at the end -->
    <canvas id="heartCanvas"></canvas>
  </div>

</div>
